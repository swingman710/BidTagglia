<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battag Bid — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- White brand header -->
    <header class="appbar">
      <div class="appbar-inner">
        <div class="brand">
          <span class="brand-mark">BB</span>
          <span class="brand-word">battag<span class="brand-dot">.</span>bid</span>
          <span class="brand-tag">Admin Console</span>
        </div>
        <div class="appbar-right">
          <span class="user-chip">
            <span class="avatar">A</span>
            <span class="uname">Administrator</span>
          </span>
          <button id="logout" class="btn-ghost sm">Sign out</button>
        </div>
      </div>
    </header>

    <!-- Dark slate nav bar -->
    <nav class="mainnav">
      <div class="mainnav-inner">
        <button class="nav-tab active">Dropdown lists</button>
        <a class="nav-tab" href="dashboard.html">← Back to app</a>
      </div>
    </nav>

    <main class="page">
      <div class="page-inner">
        <div class="welcome">
          <div class="page-title">Dropdown lists</div>
          <div class="page-sub">Manage the option lists used by the New Opportunity form.</div>
        </div>

        <!-- Add a new list -->
        <section class="panel">
          <h2>Add a dropdown</h2>
          <form id="new-list-form" class="new-list" autocomplete="off">
            <div class="field">
              <label for="new-list-name">Dropdown name</label>
              <input
                type="text"
                id="new-list-name"
                placeholder="e.g. Client, Owner, Stage"
                required
              />
            </div>
            <button type="submit" class="btn-primary inline">Add dropdown</button>
          </form>
        </section>

        <!-- Existing lists -->
        <div id="lists" class="admin-grid"></div>
        <div id="lists-empty" class="empty" style="display: none">
          No dropdowns yet — add one above.
        </div>
      </div>
    </main>

    <script src="lists.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
