<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battag Bid — Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="login-page">
    <div class="backdrop"></div>
    <main class="login-card">
      <div class="brand">
        <img src="bei-logo.png" alt="Battaglia" class="brand-logo" />
        <h1 id="title">Battag Bid</h1>
        <p id="brand-sub">Bid &amp; opportunity tracker</p>
      </div>

      <div id="error" class="error">Sign-in failed. Please try again.</div>

      <button type="button" class="btn-primary ms-signin" id="ms-signin">
        <svg class="ms-logo" width="18" height="18" viewBox="0 0 21 21" aria-hidden="true">
          <rect x="1" y="1" width="9" height="9" fill="#f25022" />
          <rect x="11" y="1" width="9" height="9" fill="#7fba00" />
          <rect x="1" y="11" width="9" height="9" fill="#00a4ef" />
          <rect x="11" y="11" width="9" height="9" fill="#ffb900" />
        </svg>
        Sign in with Microsoft
      </button>

      <p class="login-foot" id="foot">Authorized users only · your organization account</p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3/lib/msal-browser.min.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
  </body>
</html>
